name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: social-media
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      localstack:
        image: localstack/localstack:3.4
        ports:
          - 4566:4566
        env:
          SERVICES: dynamodb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/social-media

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/social-media

      - name: Create Explore DynamoDB table (LocalStack)
        run: |
          python3 -m pip install --user awscli
          export PATH="$HOME/.local/bin:$PATH"
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4566/_localstack/health && break
            sleep 2
          done
          aws dynamodb describe-table \
            --endpoint-url=http://127.0.0.1:4566 \
            --region us-east-1 \
            --table-name Explore >/dev/null 2>&1 \
          || aws dynamodb create-table \
            --endpoint-url=http://127.0.0.1:4566 \
            --region us-east-1 \
            --table-name Explore \
            --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
            --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/social-media
          DATABASE_HOST: 127.0.0.1
          DATABASE_USER: root
          DATABASE_PASSWORD: root
          DATABASE_NAME: social-media
          DATABASE_PORT: "3306"
          JWT_SECRET_KEY: ci-jwt-secret-key-at-least-32-characters-long
          AWS_ENDPOINT_URL: http://127.0.0.1:4566
          AWS_REGION: us-east-1
