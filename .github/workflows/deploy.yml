name: Despliegue
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restart service on EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/ElPasillo/DesarrolloSoftware
            git pull origin main
            npm install
            npx prisma generate
            npm run build
            sudo systemctl restart DesarrolloSoftware-api
            systemctl is-active --quiet DesarrolloSoftware-api && echo "Service Running" || exit 1
